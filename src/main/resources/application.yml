spring:
  application:
    name: cdq-banking-import-service
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  mongodb:
    uri: mongodb://localhost:27017/cdq-banking-import-service

import:
  csv:
    max-rows: 10000

mongock:
  migration-scan-package: com.cdq.banking.migration

management:
  endpoints:
    access:
      default: unrestricted
      max-permitted: unrestricted
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: always

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui
